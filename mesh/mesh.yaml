default:
  environment:
    STREAMX_BLUEPRINTS_KEY_VALUE_STATE_REPOSITORY_BACKEND: rocksdb
    STREAMX_BLUEPRINTS_KEY_VALUE_STATE_REPOSITORY_ROCKSDB_PATH: /var/lib/rocksdb

descriptors:
  relay:
    type: processing
    containers:
      service:
        incoming:
          events: {}
        outgoing:
          relayed-events: {}

  web-server-sink:
    type: edge
    volumes:
      repository-volume:
        size: 20Gi
        persistent: true
    containers:
      sink:
        image: ghcr.io/streamx-com/streamx-blueprints/web-server-sink:3.0.18-native
        incoming:
          resources:
            initState: delta
        servicePorts:
          - 8083:8080
        volumes:
          - repository-volume:/srv/www
        environment:
          STREAMX_BLUEPRINTS_WEB_SERVER_SINK_STORAGE_ROOT_DIRECTORY: /srv/www
      webserver:
        image: registry.prod-ext.streamx.cloud/streamx-docker-hub-public-proxy/library/nginx:1.26.0
        servicePorts:
          - 8084:80
        volumes:
          - repository-volume:/usr/share/nginx/html

  openai-rag-sink:
    type: edge
    volumes:
      pgvolume:
        size: 20Gi
        persistent: true
    containers:
      sink:
        image: ghcr.io/streamx-hub/streamx-rag-service:1.0.0-jvm
        incoming:
          resources:
            initState: reply
        environment:
          STREAMX_POSTGRES_URL: jdbc:postgresql://${STREAMX_SERVICE_ID}.postgres:5432/ragdb
        servicePorts:
          - 8085:8080
      postgres:
        image: pgvector/pgvector:pg17
        servicePorts:
          - 5432:5432
        environment:
          PGDATA: /data/rag-postgres/pgdata
        volumes:
          - pgvolume:/data/rag-postgres

networking:
  httpRoutes:
    ingestion-route:
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: ingestion/rest-ingestion
              port: 8080
    web-server-and-chat-route:
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: edge/web-server-sink
              port: 8084
        - matches:
            - path:
                type: PathPrefix
                value: /api
          backendRefs:
            - name: edge/openai-rag-sink
              port: 8085
sources:
  cli:
    outgoing:
      - ref: inbox.pages
        produces:
          - com.streamx.blueprints.page.published.v1
          - com.streamx.blueprints.page.unpublished.v1
      - ref: inbox.web-resources
        produces:
          - com.streamx.blueprints.web-resource.published.v1
          - com.streamx.blueprints.web-resource.unpublished.v1
      - ref: inbox.data
        produces:
          - com.streamx.blueprints.data.published.v1
          - com.streamx.blueprints.data.unpublished.v1

ingestion:
  rest-ingestion:
    containers:
      proxy: {}

processing:
  pages-relay:
    descriptor: relay
    containers:
      service:
        incoming:
          events:
            ref: inbox.pages
        outgoing:
          relayed-events:
            ref: outbox.pages

  web-resources-relay:
    descriptor: relay
    containers:
      service:
        incoming:
          events:
            ref: inbox.web-resources
        outgoing:
          relayed-events:
            ref: outbox.web-resources

  data-relay:
    descriptor: relay
    containers:
      service:
        incoming:
          events:
            ref: inbox.data
        outgoing:
          relayed-events:
            ref: outbox.data

edge:
  web-server-sink:
    descriptor: web-server-sink
    containers:
      sink:
        incoming:
          resources:
            ref: outbox.pages,outbox.web-resources
        environmentFrom:
          configs:
            - web-server-sink.properties

      webserver:
        volumesFrom:
          configs:
            - nginx_conf/nginx.conf:/etc/nginx/conf.d/default.conf

  openai-rag-sink:
    descriptor: openai-rag-sink
    containers:
      sink:
        incoming:
          resources:
            ref: outbox.data
        environmentFrom:
          secrets:
            - encrypted/open-ai-rag.properties
            - encrypted/open-ai-rag-postgres-creds.properties
          configs:
            - open-ai-rag.properties
      postgres:
        environmentFrom:
          secrets:
            - encrypted/postgres.properties
        volumesFrom:
          configs:
            - postgres/init.sql:/docker-entrypoint-initdb.d/init.sql