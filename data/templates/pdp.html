<!DOCTYPE html>
<html lang="en">
<head>
  [@cms.page /]
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <meta name="description" content="This example presents how to change static html files located on your local into pages available via StreamX">
  <link rel="stylesheet" href="../web-resources/css/streamx.css" type="text/css"/>
</head>
<body class="m-0 flex flex-col min-h-screen">
<header>
  <nav class="bg-white">
    <div class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8">
      <div class="relative flex sm:h-16 items-center justify-between">
        <div class="flex flex-1 items-center justify-center sm:items-center flex-col sm:flex-row sm:justify-between flex-wrap sm:flex-nowrap">
          [#assign rootNode = cmsfn.contentByPath("/index")]
          [#assign blogNode = cmsfn.contentByPath("/blog")]
          [#assign productsNode = cmsfn.contentByPath("/products")]
          <div class="flex flex-shrink-0 items-center">
            <a href="${cmsfn.link(rootNode)}" class="px-3 py-2"><span class="text-indigo-600 font-semibold">StreamX </span>&#65372; HTML</a>
          </div>
          <div class="sm:ml-6 flex flex-wrap sm:flex-nowrap">
            <div class="flex space-x-4 flex-wrap sm:flex-nowrap sm:ml-0">
              <a href="/" class="rounded-md px-3 py-2 text-sm font-medium hover:bg-gray-100">Home</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>
</header>

<div class="bg-white pt-6">
  <!-- Image gallery -->
  <div class="mx-auto mt-6 max-w-2xl px-4 lg:grid lg:max-w-7xl lg:gap-x-8 lg:px-8">
    <div class="aspect-h-2 aspect-w-3 overflow-hidden rounded-lg">
      <img src="{{primaryImage.url}}" alt="{{primaryImage.alt}}" class="h-full w-full object-cover object-center">
    </div>
  </div>

  <!-- Product info -->
  <div class="mx-auto max-w-2xl px-4 pb-4 pt-10 sm:px-6 lg:grid lg:max-w-7xl lg:grid-cols-3 lg:gap-x-8 lg:px-8 lg:pb-24 lg:pt-16">
    <div class="lg:col-span-2 lg:border-r lg:border-gray-200 lg:pr-8">
      <h1 class="text-2xl font-bold tracking-tight text-gray-900 sm:text-3xl">{{name}}</h1>
    </div>
    <div class="py-10 lg:col-span-2 lg:col-start-1 lg:border-r lg:border-gray-200 lg:pb-16 lg:pr-8 lg:pt-6">
      <div class="space-y-6">
        <p class="antialiased">{{description | raw}}</p>
      </div>
    </div>

    <!-- Options -->
    <div class="mt-4 lg:row-span-3 lg:mt-0">

      <p class="text-3xl tracking-tight text-gray-900">{{price.value}}&euro;</p>
      <!-- Reviews -->
      <div class="mt-6">
        <div class="flex items-center">
          <div class="flex items-center">
            <!-- Active: "text-gray-900", Default: "text-gray-200" -->
            <svg class="h-5 w-5 flex-shrink-0 text-gray-900" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M10.868 2.884c-.321-.772-1.415-.772-1.736 0l-1.83 4.401-4.753.381c-.833.067-1.171 1.107-.536 1.651l3.62 3.102-1.106 4.637c-.194.813.691 1.456 1.405 1.02L10 15.591l4.069 2.485c.713.436 1.598-.207 1.404-1.02l-1.106-4.637 3.62-3.102c.635-.544.297-1.584-.536-1.65l-4.752-.382-1.831-4.401z" clip-rule="evenodd" />
            </svg>
            <svg class="h-5 w-5 flex-shrink-0 text-gray-900" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M10.868 2.884c-.321-.772-1.415-.772-1.736 0l-1.83 4.401-4.753.381c-.833.067-1.171 1.107-.536 1.651l3.62 3.102-1.106 4.637c-.194.813.691 1.456 1.405 1.02L10 15.591l4.069 2.485c.713.436 1.598-.207 1.404-1.02l-1.106-4.637 3.62-3.102c.635-.544.297-1.584-.536-1.65l-4.752-.382-1.831-4.401z" clip-rule="evenodd" />
            </svg>
            <svg class="h-5 w-5 flex-shrink-0 text-gray-900" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M10.868 2.884c-.321-.772-1.415-.772-1.736 0l-1.83 4.401-4.753.381c-.833.067-1.171 1.107-.536 1.651l3.62 3.102-1.106 4.637c-.194.813.691 1.456 1.405 1.02L10 15.591l4.069 2.485c.713.436 1.598-.207 1.404-1.02l-1.106-4.637 3.62-3.102c.635-.544.297-1.584-.536-1.65l-4.752-.382-1.831-4.401z" clip-rule="evenodd" />
            </svg>
            <svg class="h-5 w-5 flex-shrink-0 text-gray-900" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M10.868 2.884c-.321-.772-1.415-.772-1.736 0l-1.83 4.401-4.753.381c-.833.067-1.171 1.107-.536 1.651l3.62 3.102-1.106 4.637c-.194.813.691 1.456 1.405 1.02L10 15.591l4.069 2.485c.713.436 1.598-.207 1.404-1.02l-1.106-4.637 3.62-3.102c.635-.544.297-1.584-.536-1.65l-4.752-.382-1.831-4.401z" clip-rule="evenodd" />
            </svg>
            <svg class="h-5 w-5 flex-shrink-0 text-gray-200" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M10.868 2.884c-.321-.772-1.415-.772-1.736 0l-1.83 4.401-4.753.381c-.833.067-1.171 1.107-.536 1.651l3.62 3.102-1.106 4.637c-.194.813.691 1.456 1.405 1.02L10 15.591l4.069 2.485c.713.436 1.598-.207 1.404-1.02l-1.106-4.637 3.62-3.102c.635-.544.297-1.584-.536-1.65l-4.752-.382-1.831-4.401z" clip-rule="evenodd" />
            </svg>
            <span class="ml-3 text-sm font-medium text-indigo-600 hover:text-indigo-500">117 reviews</span>
          </div>
        </div>
      </div>
      <section aria-labelledby="options-heading" class="mt-10">
        <form>
          <!-- Colors -->
          <fieldset aria-label="Choose a color">
            <legend class="text-sm font-medium text-gray-900">Color</legend>

            <div class="mt-4 flex items-center space-x-3">
              <!--
              Active and Checked: "ring ring-offset-1"
              Not Active and Checked: "ring-2"
              -->
              <label aria-label="White" class="relative -m-0.5 flex cursor-pointer items-center justify-center rounded-full p-0.5 ring-gray-400 focus:outline-none">
                <input type="radio" name="color-choice" value="White" class="sr-only">
                <span aria-hidden="true" class="h-8 w-8 rounded-full border border-black border-opacity-10 bg-white"></span>
              </label>
              <label aria-label="Gray" class="relative -m-0.5 flex cursor-pointer items-center justify-center rounded-full p-0.5 ring-gray-400 focus:outline-none">
                <input type="radio" name="color-choice" value="Gray" class="sr-only">
                <span aria-hidden="true" class="h-8 w-8 rounded-full border border-black border-opacity-10 bg-gray-200"></span>
              </label>
              <label aria-label="Black" class="relative -m-0.5 flex cursor-pointer items-center justify-center rounded-full p-0.5 ring-gray-900 focus:outline-none">
                <input type="radio" name="color-choice" value="Black" class="sr-only">
                <span aria-hidden="true" class="h-8 w-8 rounded-full border border-black border-opacity-10 bg-gray-900"></span>
              </label>
            </div>
          </fieldset>
        </form>
      </section>

      <button type="submit" class="mt-10 flex w-full items-center justify-center rounded-md border border-transparent bg-indigo-600 px-8 py-3 text-base font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">Add to cart</button>
    </div>
  </div>
</div>
<footer>
  <hr class="mt-6 mb-3 border-gray-200 mx-10"/>
  <div class="flex flex-col items-center sm:flex-row sm:justify-center mb-3">
    <p class="text-sm text-gray-500">&copy; 2026 StreamX Demos</p>
  </div>
  <streamx-chat
      title="Assistant"
      placeholder="Type your question…"
      auto-open="1500">
  </streamx-chat>
  <script defer src="../web-resources/js/streamx-chat.js"></script>
</footer>
</body>
</html>
