<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <meta name="description" content="This example presents how to change static html files located on your local into pages available via StreamX">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="m-0 flex flex-col min-h-screen">
<header>
  <nav class="bg-white">
    <div class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8">
      <div class="relative flex sm:h-16 items-center justify-between">
        <div class="flex flex-1 items-center justify-center sm:items-center flex-col sm:flex-row sm:justify-between flex-wrap sm:flex-nowrap">
          <div class="flex flex-shrink-0 items-center">
            <a href="/" class="px-3 py-2"><span class="text-indigo-600 font-semibold">StreamX </span>&#65372; HTML</a>
          </div>
          <div class="sm:ml-6 flex flex-wrap sm:flex-nowrap">
            <div class="flex space-x-4 flex-wrap sm:flex-nowrap sm:ml-0">
              <a href="/" class="rounded-md px-3 py-2 text-sm font-medium hover:bg-gray-100">Home</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>
</header>

<main class="flex-1">
  <div class="px-6 pt-10 lg:px-8">
    <div class="mx-auto max-w-2xl py-32 sm:py-48 lg:py-56">
      <div class="text-center">
        <h1 class="text-4xl font-bold tracking-tight text-gray-900 sm:text-6xl">
          RAG Integration Demo with StreamX
        </h1>

        <p class="mt-6 text-lg leading-8 text-gray-600">
          This page is a demonstration of Retrieval-Augmented Generation (RAG) integrated with StreamX.
          Use the chatbot in the bottom-right corner to explore and retrieve information about available products in real time.
        </p>
        <div class="mt-10 flex items-center justify-center gap-x-6">
        </div>
      </div>
    </div>
  </div>
</main>

<footer>
  <hr class="mt-6 mb-3 border-gray-200 mx-10"/>
  <div class="flex flex-col items-center sm:flex-row sm:justify-center mb-3">
    <p class="text-sm text-gray-500">&copy; 2026 StreamX Demos</p>
  </div>
  <streamx-chat
      title="Assistant"
      placeholder="Type your question…"
      auto-open="1500">
  </streamx-chat>
  <script defer src="../web-resources/js/streamx-chat.js"></script>
</footer>
</body>
</html>
